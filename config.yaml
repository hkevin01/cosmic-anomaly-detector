# Default configuration for Cosmic Anomaly Detector

# System Settings
log_level: INFO
log_format: "%(asctime)s - %(name)s - %(levelname)s - %(funcName)s:%(lineno)d - %(message)s"
data_root_path: "data/"
output_path: "output/"
temp_path: "temp/"

# Performance Settings
max_workers: 4
memory_limit_gb: 8.0
gpu_enabled: true
batch_size: 16

# Batch Processing Configuration
batch_processing:
  n_workers: 6               # 0 = auto (cpu_count // 2)
  chunk_size: 4              # Files submitted to each worker at once
  score_threshold: 0.3       # Minimum anomaly score to report
  device: auto               # 'auto' | 'cuda' | 'cpu'
  memory_limit_gb: 0         # Per-worker RSS limit in GB (0 = no limit)
  save_images: false         # Save annotated PNG for high-score detections
  sigma_threshold: 4.0       # Source extraction sigma clipping

# GPU Acceleration Configuration
gpu:
  device: auto               # 'auto' | 'cuda' | 'cpu'
  tile_size: 2048            # Max tile size for tiled GPU convolution
  fallback_to_cpu: true      # Silently fall back to CPU if GPU unavailable

# SETI Catalog Configuration
seti_catalog:
  use_breakthrough_listen: true
  use_hpms_stars: true
  use_hephaistos_candidates: true
  max_targets: 100
  mast_radius_arcmin: 2.0
  priority_min: medium       # 'high' | 'medium' | 'low'
  cache_ttl_hours: 24
  data_dir: data/seti_downloads

# Scientific Settings
scientific_notation: true
reproducible_random_seed: 42
validation_strict: true

# Image Processing Configuration
image_processing:
  max_image_size: 4096
  noise_reduction_sigma: 1.0
  edge_detection_threshold: 0.1
  object_detection_min_area: 100
  coordinate_system: "icrs"
  preprocessing_steps:
    - "noise_reduction"
    - "edge_enhancement"
    - "normalization"

# Gravitational Analysis Configuration
gravitational_analysis:
  gravitational_constant: 6.67430e-11  # m^3 kg^-1 s^-2
  kepler_tolerance: 0.05  # 5% tolerance for orbital mechanics
  lensing_detection_threshold: 0.01
  mass_estimation_method: "orbital_velocity"
  physics_validation_strict: true

# Classification Configuration
classification:
  model_type: "ensemble"
  confidence_threshold: 0.85
  false_positive_penalty: 10.0
  feature_extraction_method: "combined"
  cross_validation_folds: 5
  model_save_path: "models/"

# Anomaly Detection Configuration
anomaly_detection:
  multi_modal_weights:
    visual: 0.4
    gravitational: 0.4
    spectral: 0.2
  detection_threshold: 0.9
  consensus_required: 2  # Minimum number of methods that must agree
  adaptive_thresholds: true

# Machine Learning Configuration
machine_learning:
  model_types: ["ensemble", "deep_learning"]
  feature_scaling: "standard"
  max_epochs: 100
  batch_size: 32
  learning_rate: 0.001
  early_stopping_patience: 10
  cross_validation_folds: 5

# Training Data Configuration
training_data:
  synthetic_samples: 1000
  anomaly_fraction: 0.1
  augmentation_factor: 2
  balance_classes: true
  noise_level: 0.1
  save_path: "data/training/"

# Feature Engineering Configuration
feature_engineering:
  include_photometric: true
  include_morphological: true
  include_physics: true
  include_context: true
  feature_selection_threshold: 0.01
  max_features: 100
